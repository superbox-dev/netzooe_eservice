name: CI

permissions:
  contents: read
  pull-requests: write

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - develop
    tags:
      - v*

jobs:
  code-analysis:
    name: Code analysis
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up project
        uses: ./.github/actions/setup-project
      - name: Lint python files with black
        run: uv run black --diff --check $(git ls-files '*.py')
      - name: Lint python files with mypy
        run: uv run mypy $(git ls-files '*.py')
      - name: Lint python files with ruff
        run: uv run ruff check $(git ls-files '*.py')
      - name: Lint YAML files
        run: uv run yamllint $(git ls-files '*.yml' '*.yaml')
      - name: Lint Markdown files
        run: uv run rumdl check $(git ls-files '*.md')

  validation:
    name: Validation
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Run hassfest validation
        uses: home-assistant/actions/hassfest@master
#      - name: Run HACS validation
#        uses: hacs/action@22.5.0
#        with:
#          category: integration

  security:
    name: Security
    uses: ./.github/workflows/security.yml

  tests:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up project
        uses: ./.github/actions/setup-project
      - name: Run tests
        run: uv run pytest -n auto
      - name: Upload coverage
        uses: actions/upload-artifact@v6
        with:
          name: coverage-xml
          path: reports/coverage.xml
          if-no-files-found: error
          overwrite: True

  coverage:
    name: Generate coverage badge
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    needs:
      - tests
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up project
        uses: ./.github/actions/setup-project
      - name: Download coverage
        uses: actions/download-artifact@v7
        with:
          name: coverage-xml
          path: reports
      - name: Create coverage badge
        run: uv run genbadge coverage --input-file reports/coverage.xml
      - name: Verify coverage badge changed
        uses: tj-actions/verify-changed-files@v20
        id: changed-files
        with:
          files: coverage-badge.svg
      - name: Commit coverage badge
        if: steps.changed-files.outputs.files_changed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add coverage-badge.svg
          git commit -m "Updated coverage-badge.svg"
      - name: Push changes
        if: steps.changed-files.outputs.files_changed == 'true'
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}

  release:
    name: Release on GitHub
    runs-on: ubuntu-latest
    if: github.ref_type == 'tag'
    needs:
      - code-analysis
      - validation
      - security
      - tests
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Set up project
        uses: ./.github/actions/setup-project
      - name: Check if prerelease
        id: check_prerelease
        run: |
          TAG_NAME="${GITHUB_REF#refs/tags/}"
          echo "Tag: $TAG_NAME"

          if [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+b[0-9]+$ ]]; then
            echo "🟡 Pre-release detected"
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
          else
            echo "🟢 Regular release"
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Create ZIP file
        run: |
          cd ${{ github.workspace }}/custom_components/netzooe_eservice
          zip -r ${{ github.workspace }}/netzooe_eservice.zip ./
      - name: Release on GitHub
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ steps.check_prerelease.outputs.prerelease }}
          files: ${{ github.workspace }}/netzooe_eservice.zip
